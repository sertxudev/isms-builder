name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node.js ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-do-not-use-in-production
          STORAGE_BACKEND: json

      - name: Verify pinned dependencies
        run: |
          # pdf-parse muss exakt 1.1.1 sein — v2 hat inkompatible API (siehe PINNED-DEPS.md)
          INSTALLED=$(node -e "console.log(require('./node_modules/pdf-parse/package.json').version)")
          if [ "$INSTALLED" != "1.1.1" ]; then
            echo "::error::pdf-parse ist auf Version $INSTALLED — muss exakt 1.1.1 sein! Siehe PINNED-DEPS.md"
            exit 1
          fi
          echo "✓ pdf-parse $INSTALLED (korrekt gepinnt)"

      - name: Security audit (critical + high — hard fail)
        run: npm audit --audit-level=high

      - name: Security audit (moderate — informational)
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for outdated packages
        run: npm outdated || true

  security-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    # Läuft nur auf main, nicht bei jedem Feature-Branch-Push
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Full audit report (JSON)
        run: npm audit --json > audit-report.json || true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit-report.json
          retention-days: 30
