name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          JWT_SECRET: ci-test-secret
          STORAGE_BACKEND: json

      - name: Create deployment archive
        run: |
          tar --exclude=node_modules --exclude=data --exclude=ssl \
              --exclude=.env --exclude='.git' --exclude='*.log' \
              --warning=no-file-changed \
              -czf isms-builder-${{ github.ref_name }}.tar.gz . || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: isms-builder-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
          body: |
            ## ISMS Builder ${{ github.ref_name }}

            ### Quick Start
            ```bash
            tar -xzf isms-builder-${{ github.ref_name }}.tar.gz
            npm install
            cp .env.example .env   # JWT_SECRET setzen
            npm start
            ```

            See [CHANGELOG](CHANGELOG.md) and [documentation](docs/ISMS-build-documentation.md) for details.
